<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Safari Tint Playground social preview</title>
  <desc id="desc">A stark preview card for Safari Tint Playground with a minimalist Safari chrome outline.</desc>

  <rect width="1200" height="630" fill="#ffffff" />

  <g font-family="'.SF NS', Inter, 'Helvetica Neue', Arial, sans-serif">
    <g fill="#000000" font-size="88" font-weight="700" letter-spacing="-2">
      <text x="72" y="242">Safari Tint</text>
      <text x="72" y="330">Playground</text>
    </g>
    <text x="76" y="414" fill="#5f686d" font-size="30" font-weight="400" letter-spacing="-0.2">Helps you predict how Safari 26+ tints its chrome</text>
  </g>

  <g transform="translate(836 138)">
    <rect x="0" y="0" width="238" height="354" fill="#ffffff" stroke="#000000" stroke-width="14" />
    <rect x="76" y="28" width="86" height="28" rx="14" fill="#000000" />
    <rect x="30" y="277" width="178" height="42" rx="21" fill="#000000" />
    <rect x="58" y="295" width="122" height="6" rx="3" fill="#ffffff" />
  </g>
</svg>
