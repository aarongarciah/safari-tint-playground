<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
      data-managed-viewport
    />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: light)"
      content="#ffffff"
      data-theme-color-light
    />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: dark)"
      content="#000000"
      data-theme-color-dark
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" data-managed-favicon />
    <title>Safari Tint Playground</title>
    <script>
      (() => {
        const colorSchemeQuery = window.matchMedia('(prefers-color-scheme: dark)');
        const updateFavicon = () => {
          const scheme = colorSchemeQuery.matches ? 'dark' : 'light';

          document
            .querySelector('[data-managed-favicon]')
            ?.setAttribute('href', `/favicon-${scheme}.svg?v=${scheme}-${Date.now()}`);
        };

        updateFavicon();
        if (colorSchemeQuery.addEventListener) {
          colorSchemeQuery.addEventListener('change', updateFavicon);
        } else {
          colorSchemeQuery.addListener(updateFavicon);
        }
        const defaults = {
          mode: 'light',
          viewportFitCover: false,
          headerTop: 0,
          footerBottom: 0,
          colors: {
            light: {
              page: '#ffffff',
              header: '#ffffff',
              footer: '#ffffff',
              theme: '#ffffff',
            },
            dark: {
              page: '#000000',
              header: '#000000',
              footer: '#000000',
              theme: '#000000',
            },
          },
        };
        const state = {
          mode: defaults.mode,
          viewportFitCover: false,
          headerTop: defaults.headerTop,
          footerBottom: defaults.footerBottom,
          colors: {
            light: { ...defaults.colors.light },
            dark: { ...defaults.colors.dark },
          },
        };
        if (state.mode !== 'dark') {
          state.mode = 'light';
        }
        const activeColors = state.colors[state.mode];
        const root = document.documentElement;
        root.dataset.theme = state.mode;
        root.dataset.viewportFitCover = String(state.viewportFitCover);
        root.style.colorScheme = state.mode;
        root.style.setProperty('--page-bg', activeColors.page);
        root.style.setProperty('--header-bg', activeColors.header);
        root.style.setProperty('--header-top', `${Number.isFinite(state.headerTop) ? state.headerTop : 0}px`);
        root.style.setProperty('--footer-bg', activeColors.footer);
        root.style.setProperty('--footer-bottom', `${Number.isFinite(state.footerBottom) ? state.footerBottom : 0}px`);
        document
          .querySelector('[data-managed-viewport]')
          ?.setAttribute(
            'content',
            `width=device-width, initial-scale=1${state.viewportFitCover ? ', viewport-fit=cover' : ''}`,
          );
        document
          .querySelector('[data-theme-color-light]')
          ?.setAttribute('content', state.colors.light.theme);
        document
          .querySelector('[data-theme-color-dark]')
          ?.setAttribute('content', state.colors.dark.theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
