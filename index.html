<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
      data-managed-viewport
    />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: light)"
      content="#ffffff"
      data-theme-color-light
    />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: dark)"
      content="#171717"
      data-theme-color-dark
    />
    <meta
      name="description"
      content="Test browser chrome tinting, safe area insets, fixed headers, footers, and Safari toolbar behavior across devices."
    />
    <link rel="canonical" href="https://safari-tint.aarongarcia.workers.dev/" />
    <meta property="og:title" content="Safari Tint Playground" />
    <meta
      property="og:description"
      content="Test browser chrome tinting, safe area insets, fixed headers, footers, and Safari toolbar behavior across devices."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://safari-tint.aarongarcia.workers.dev/" />
    <meta property="og:site_name" content="Safari Tint Playground" />
    <meta property="og:image" content="https://safari-tint.aarongarcia.workers.dev/social-preview.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Safari Tint Playground preview showing a minimalist Safari chrome outline."
    />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Safari Tint Playground" />
    <meta
      name="twitter:description"
      content="Test browser chrome tinting, safe area insets, fixed headers, footers, and Safari toolbar behavior across devices."
    />
    <meta name="twitter:image" content="https://safari-tint.aarongarcia.workers.dev/social-preview.png" />
    <meta
      name="twitter:image:alt"
      content="Safari Tint Playground preview showing a minimalist Safari chrome outline."
    />
    <meta name="twitter:creator" content="@aarongarciah" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" data-managed-favicon />
    <title>Safari Tint Playground</title>
    <script>
      (() => {
        const colorSchemeQuery = window.matchMedia('(prefers-color-scheme: dark)');
        const updateFavicon = () => {
          const scheme = colorSchemeQuery.matches ? 'dark' : 'light';

          document
            .querySelector('[data-managed-favicon]')
            ?.setAttribute('href', `/favicon-${scheme}.svg?v=${scheme}-${Date.now()}`);
        };

        updateFavicon();
        if (colorSchemeQuery.addEventListener) {
          colorSchemeQuery.addEventListener('change', updateFavicon);
        } else {
          colorSchemeQuery.addListener(updateFavicon);
        }
        const defaults = {
          mode: 'light',
          viewportFitCover: false,
          headerTop: 0,
          footerBottom: 0,
          colors: {
            light: {
              page: '#ffffff',
              header: '#ffffff',
              footer: '#ffffff',
              theme: '#ffffff',
            },
            dark: {
              page: '#171717',
              header: '#171717',
              footer: '#171717',
              theme: '#171717',
            },
          },
        };
        const normalizeColor = (value) => {
          const trimmedValue = String(value ?? '').trim();

          return trimmedValue || 'transparent';
        };
        const isColor = (value) => {
          const color = normalizeColor(value);

          return Boolean(window.CSS?.supports?.('color', color)) ||
            color === 'transparent' ||
            /^#[0-9a-fA-F]{6}$/.test(color);
        };
        const darkTextColor = 'oklch(14.5% 0 0deg)';
        const lightTextColor = '#ffffff';
        const lightnessThreshold = 0.62;
        const mutedForegroundMix = 0.62;
        const separatorMutedForegroundMix = 0.3;
        let colorCanvasContext;
        const getColorCanvasContext = () => {
          if (colorCanvasContext !== undefined) {
            return colorCanvasContext;
          }

          const canvas = document.createElement('canvas');
          canvas.width = 1;
          canvas.height = 1;
          colorCanvasContext = canvas.getContext('2d', { willReadFrequently: true });

          return colorCanvasContext;
        };
        const resolveCssColor = (value, fallback) => {
          const color = normalizeColor(value);

          if (color === 'transparent') {
            return fallback;
          }

          const context = getColorCanvasContext();

          if (!context) {
            return fallback;
          }

          context.clearRect(0, 0, 1, 1);
          context.fillStyle = 'rgba(0, 0, 0, 0)';
          context.fillStyle = color;
          context.fillRect(0, 0, 1, 1);

          const [r, g, b, alpha] = context.getImageData(0, 0, 1, 1).data;
          const a = alpha / 255;

          if (a === 0) {
            return fallback;
          }

          if (a === 1) {
            return { r, g, b, a };
          }

          return {
            r: Math.round(r * a + fallback.r * (1 - a)),
            g: Math.round(g * a + fallback.g * (1 - a)),
            b: Math.round(b * a + fallback.b * (1 - a)),
            a: 1,
          };
        };
        const linearizeSrgbChannel = (channel) => {
          const value = channel / 255;

          return value <= 0.04045 ? value / 12.92 : ((value + 0.055) / 1.055) ** 2.4;
        };
        const getPerceptualLightness = (color) => {
          const r = linearizeSrgbChannel(color.r);
          const g = linearizeSrgbChannel(color.g);
          const b = linearizeSrgbChannel(color.b);
          const l = Math.cbrt(0.4122214708 * r + 0.5363325363 * g + 0.0514459929 * b);
          const m = Math.cbrt(0.2119034982 * r + 0.6806995451 * g + 0.1073969566 * b);
          const s = Math.cbrt(0.0883024619 * r + 0.2817188376 * g + 0.6299787005 * b);

          return 0.2104542553 * l + 0.793617785 * m - 0.0040720468 * s;
        };
        const getTextColorForBackground = (background) =>
          getPerceptualLightness(background) >= lightnessThreshold ? darkTextColor : lightTextColor;
        const mixRgbColors = (foreground, background, foregroundAmount) => {
          const backgroundAmount = 1 - foregroundAmount;

          return {
            r: Math.round(foreground.r * foregroundAmount + background.r * backgroundAmount),
            g: Math.round(foreground.g * foregroundAmount + background.g * backgroundAmount),
            b: Math.round(foreground.b * foregroundAmount + background.b * backgroundAmount),
            a: 1,
          };
        };
        const formatRgbColor = (color) => `rgb(${color.r} ${color.g} ${color.b})`;
        const getMutedTextColorForBackground = (background) => {
          const foregroundColor = getTextColorForBackground(background) === lightTextColor
            ? { r: 255, g: 255, b: 255, a: 1 }
            : { r: 23, g: 23, b: 23, a: 1 };

          return formatRgbColor(mixRgbColors(foregroundColor, background, mutedForegroundMix));
        };
        const getSeparatorColorForBackground = (background) => {
          const foregroundColor = getTextColorForBackground(background) === lightTextColor
            ? { r: 255, g: 255, b: 255, a: 1 }
            : { r: 23, g: 23, b: 23, a: 1 };

          return formatRgbColor(
            mixRgbColors(
              foregroundColor,
              background,
              mutedForegroundMix * separatorMutedForegroundMix,
            ),
          );
        };
        const normalizeDistance = (value) => {
          const numberValue = Number(value);

          return Number.isFinite(numberValue) ? Math.max(0, Math.round(numberValue)) : 0;
        };
        const readColor = (params, key, fallback) => {
          const value = params.get(key);

          return isColor(value) ? normalizeColor(value) : fallback;
        };
        const roomId = new URLSearchParams(window.location.search).get('id');
        let cachedParams = new URLSearchParams();

        try {
          const cachedState = roomId ? window.localStorage.getItem(`safari-checker:state:${roomId}`) : null;
          cachedParams = new URLSearchParams(cachedState ?? '');
        } catch {
          cachedParams = new URLSearchParams();
        }

        const cachedMode = cachedParams.get('mode');
        const state = {
          mode: cachedMode === 'dark' ? 'dark' : defaults.mode,
          viewportFitCover: cachedParams.get('vfc') === '1',
          headerTop: normalizeDistance(cachedParams.get('headerTop') ?? defaults.headerTop),
          footerBottom: normalizeDistance(cachedParams.get('footerBottom') ?? defaults.footerBottom),
          colors: {
            light: {
              page: readColor(cachedParams, 'bgL', defaults.colors.light.page),
              header: readColor(cachedParams, 'headerL', defaults.colors.light.header),
              footer: readColor(cachedParams, 'footerL', defaults.colors.light.footer),
              theme: readColor(cachedParams, 'themeL', defaults.colors.light.theme),
            },
            dark: {
              page: readColor(cachedParams, 'bgD', defaults.colors.dark.page),
              header: readColor(cachedParams, 'headerD', defaults.colors.dark.header),
              footer: readColor(cachedParams, 'footerD', defaults.colors.dark.footer),
              theme: readColor(cachedParams, 'themeD', defaults.colors.dark.theme),
            },
          },
        };
        if (state.mode !== 'dark') {
          state.mode = 'light';
        }
        const activeColors = state.colors[state.mode];
        const defaultPageBackground = resolveCssColor(defaults.colors[state.mode].page, {
          r: state.mode === 'dark' ? 23 : 255,
          g: state.mode === 'dark' ? 23 : 255,
          b: state.mode === 'dark' ? 23 : 255,
          a: 1,
        });
        const pageBackground = resolveCssColor(activeColors.page, defaultPageBackground);
        const headerBackground = resolveCssColor(activeColors.header, pageBackground);
        const footerBackground = resolveCssColor(activeColors.footer, pageBackground);
        const root = document.documentElement;
        root.dataset.theme = state.mode;
        root.dataset.viewportFitCover = String(state.viewportFitCover);
        root.style.colorScheme = state.mode;
        root.style.setProperty('--page-bg', activeColors.page);
        root.style.setProperty('--page-fg', getTextColorForBackground(pageBackground));
        root.style.setProperty('--page-muted-fg', getMutedTextColorForBackground(pageBackground));
        root.style.setProperty('--page-separator-color', getSeparatorColorForBackground(pageBackground));
        root.style.setProperty('--header-bg', activeColors.header);
        root.style.setProperty('--header-fg', getTextColorForBackground(headerBackground));
        root.style.setProperty('--header-muted-fg', getMutedTextColorForBackground(headerBackground));
        root.style.setProperty('--header-top', `${Number.isFinite(state.headerTop) ? state.headerTop : 0}px`);
        root.style.setProperty('--footer-bg', activeColors.footer);
        root.style.setProperty('--footer-fg', getTextColorForBackground(footerBackground));
        root.style.setProperty('--footer-muted-fg', getMutedTextColorForBackground(footerBackground));
        root.style.setProperty('--footer-bottom', `${Number.isFinite(state.footerBottom) ? state.footerBottom : 0}px`);
        document
          .querySelector('[data-managed-viewport]')
          ?.setAttribute(
            'content',
            `width=device-width, initial-scale=1${state.viewportFitCover ? ', viewport-fit=cover' : ''}`,
          );
        document
          .querySelector('[data-theme-color-light]')
          ?.setAttribute('content', state.colors.light.theme);
        document
          .querySelector('[data-theme-color-dark]')
          ?.setAttribute('content', state.colors.dark.theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
